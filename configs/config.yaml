# Application Configuration
server:
  host: "localhost"
  port: "8080"
  mode: "debug"  # debug, release, test

# Database Configuration
database:
  mysql_primary:
    type: "mysql"
    mysql:
      host: "localhost"
      port: 3306
      database: "myapp"
      username: "root"
      password: "secret"
      charset: "utf8mb4"
      max_open_conns: 25
      max_idle_conns: 10
      conn_max_lifetime: "1h"
      conn_max_idle_time: "30m"

  redis_cache:
    type: "redis"
    redis:
      host: "localhost"
      port: 6379
      password: ""
      database: 0
      pool_size: 10
      min_idle_conns: 2
      max_retries: 3
      dial_timeout: "5s"
      read_timeout: "3s"
      write_timeout: "3s"
      pool_timeout: "4s"

# Cache Configuration
cache:
  type: "redis"
  redis:
    host: "localhost"
    port: 6379
    password: ""
    database: 0
    pool_size: 10
    min_idle_conns: 2

# Logger Configuration
logger:
  level: "info"  # debug, info, warn, error
  env: "dev"      # dev, prod, test
  log_path: "./logs/app.log"

# Tracing Configuration
tracing:
  zipkin:
    type: "zipkin"
    service_name: "golang-gin-rpc"
    service_version: "1.0.0"
    environment: "development"
    enabled: false
    host: "localhost"
    port: 9411
    endpoint: "/api/v2/spans"
    username: ""
    password: ""
    sample_rate: 1.0
    batch_timeout: "5s"
    max_export_batch_size: 512
    options:
      timeout: "10s"
      max_attempts: 3
  
  jaeger:
    type: "jaeger"
    service_name: "golang-gin-rpc"
    service_version: "1.0.0"
    environment: "development"
    enabled: false
    host: "localhost"
    port: 14268
    endpoint: "/api/traces"
    username: ""
    password: ""
    sample_rate: 1.0
    batch_timeout: "5s"
    max_export_batch_size: 512
    options:
      timeout: "10s"
      max_attempts: 3
  
  otlp:
    type: "otlp"
    service_name: "golang-gin-rpc"
    service_version: "1.0.0"
    environment: "development"
    enabled: false
    host: "localhost"
    port: 4317
    endpoint: ""
    username: ""
    password: ""
    sample_rate: 1.0
    batch_timeout: "5s"
    max_export_batch_size: 512
    options:
      timeout: "10s"
      max_attempts: 3
      insecure: true

# RPC Configuration
rpc:
  servers:
    grpc:
      type: "grpc"
      host: "localhost"
      port: 50051
      network: "tcp"
      timeout: 30
      max_msg_size: 4194304  # 4MB
      enable_tls: false
      cert_file: ""
      key_file: ""
      reflection: true
    
    jsonrpc:
      type: "jsonrpc"
      host: "localhost"
      port: 8081
      network: "tcp"
      timeout: 30
      max_msg_size: 4194304  # 4MB
      enable_tls: false
      cert_file: ""
      key_file: ""
  
  timeout: 30s
  graceful_shutdown_timeout: 10s

# Service Discovery Configuration
discovery:
  enabled: false
  registry_type: "consul"  # consul, etcd
  registry_address: "localhost:8500"
  timeout: 30s
  health_check_interval: 30s
  auto_register: true
  service_name: "golang-gin-rpc"
  service_address: "localhost"
  service_port: 8080
  service_tags:
    - "go"
    - "rpc"
    - "api"
    - "microservice"

# Messaging Configuration
messaging:
  rabbitmq:
    type: "rabbitmq"
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
    database: "/"
    options:
      exchange_type: "fanout"
      durable: true
      auto_delete: false
  
  kafka:
    type: "kafka"
    host: "localhost"
    port: 9092
    username: ""
    password: ""
    database: ""
    options:
      batch_size: 100
      linger_ms: 10
      compression_type: "gzip"
      acks: "all"
      retries: 3
