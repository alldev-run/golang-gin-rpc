# RPC Configuration

rpc:
  servers:
    grpc:
      type: "grpc"
      host: "localhost"
      port: 50051
      network: "tcp"
      timeout: 30
      max_msg_size: 4194304  # 4MB
      enable_tls: false
      cert_file: ""
      key_file: ""
      reflection: true
    
    jsonrpc:
      type: "jsonrpc"
      host: "localhost"
      port: 8080
      network: "tcp"
      timeout: 30
      max_msg_size: 4194304  # 4MB
      enable_tls: false
      cert_file: ""
      key_file: ""
  
  timeout: 30s
  graceful_shutdown_timeout: 10s

# Tracing Configuration
tracing:
  service_name: "golang-gin-rpc"
  service_version: "1.0.0"
  environment: "development"
  enabled: false
  zipkin_url: "http://localhost:9411/api/v2/spans"
  sample_rate: 1.0
  batch_timeout: 5s
  max_export_batch_size: 512
