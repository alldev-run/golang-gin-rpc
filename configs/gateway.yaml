# Gateway Configuration Example
gateway:
  # Server configuration
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

  # CORS configuration
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
    allow_credentials: false
    max_age: 86400

  # Rate limiting
  rate_limit:
    enabled: true
    requests: 100
    window: "1m"

  # Audit trail configuration
  audit:
    enabled: true
    skip_paths:
      - "/health"
      - "/ready"
      - "/metrics"
    sensitive_keys:
      - "password"
      - "token"
      - "authorization"
      - "api_key"
      - "secret"

  # RBAC configuration
  rbac:
    enabled: true
    role_permissions:
      admin:
        - "user.read"
        - "user.write"
        - "order.read"
        - "order.write"
      auditor:
        - "audit.read"
        - "order.read"
      operator:
        - "order.read"

  # IP Filter Configuration (Enterprise Security)
  ip_filter:
    enabled: false                      # Enable IP filtering
    mode: "blacklist"                   # "blacklist" or "whitelist"
    ip_list:                            # IP addresses or CIDR blocks
      # - "192.168.1.100"              # Single IP
      # - "10.0.0.0/8"                 # CIDR block
      # - "172.16.0.0/12"              # Private network
    country_blacklist:                  # Block countries by ISO code
      # - "CN"
      # - "RU"
      # - "KP"
    country_whitelist:                  # Allow only specific countries (if set, overrides blacklist)
      # - "US"
      # - "GB"
      # - "DE"
    enable_geoip: false                 # Enable GeoIP2 lookup
    geoip_db_path: ""                  # Path to GeoLite2-Country.mmdb
    block_message: "Access denied"     # Response message
    block_status_code: 403             # HTTP status code
    skip_paths:                         # Paths to skip filtering
      - "/health"
      - "/metrics"
      - "/ping"
    trust_proxy: true                   # Trust X-Forwarded-For header

  # Service discovery
  discovery:
    type: "static"  # "consul", "etcd", "static"
    endpoints: []
    namespace: "default"
    timeout: "5s"
    options: {}

  # Load balancing
  load_balancer:
    strategy: "round_robin"  # "round_robin", "random", "weighted", "least_connections"

  # Routes configuration
  routes:
    - path: "/api/user/*"
      method: "*"
      service: "user-service"
      required_permissions: ["user.read"]
      permission_mode: "any"
      strip_prefix: true
      timeout: "30s"
      retries: 3
      headers:
        X-Service: "user-service"
      query: {}

    - path: "/api/order/*"
      method: "*"
      service: "order-service"
      required_permissions: ["order.read"]
      permission_mode: "any"
      strip_prefix: true
      timeout: "30s"
      retries: 3
      headers:
        X-Service: "order-service"
      query: {}

    - path: "/api/health"
      method: "GET"
      service: "health-service"
      strip_prefix: false
      timeout: "10s"
      retries: 1
      headers: {}
      query: {}
