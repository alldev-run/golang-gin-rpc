# Gateway Configuration Example
gateway:
  # Server configuration
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

  # CORS configuration
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["*"]
    allow_credentials: false
    max_age: 86400

  # Rate limiting
  rate_limit:
    enabled: true
    requests: 100
    window: "1m"

  # Service discovery
  discovery:
    type: "static"  # "consul", "etcd", "static"
    endpoints: []
    namespace: "default"
    timeout: "5s"
    options: {}

  # Load balancing
  load_balancer:
    strategy: "round_robin"  # "round_robin", "random", "weighted", "least_connections"

  # Routes configuration
  routes:
    - path: "/api/user/*"
      method: "*"
      service: "user-service"
      strip_prefix: true
      timeout: "30s"
      retries: 3
      headers:
        X-Service: "user-service"
      query: {}

    - path: "/api/order/*"
      method: "*"
      service: "order-service"
      strip_prefix: true
      timeout: "30s"
      retries: 3
      headers:
        X-Service: "order-service"
      query: {}

    - path: "/api/health"
      method: "GET"
      service: "health-service"
      strip_prefix: false
      timeout: "10s"
      retries: 1
      headers: {}
      query: {}
