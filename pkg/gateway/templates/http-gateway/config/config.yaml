host: 0.0.0.0
port: 8080
read_timeout: 30s
write_timeout: 30s
idle_timeout: 60s

# CORS 跨域配置
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

# 限流配置
# 内置限流器已支持 TTL 清理和最大 key 数限制，防止内存无限增长
rate_limit:
  enabled: false
  requests: 100
  window: 1m

# 路由配置（代理路由）
routes: []

# 健康检查和指标端点（由 gateway 自动提供，无需额外配置）：
# GET /health    - 健康检查
# GET /ready     - 就绪检查（依赖 upstream 健康状态）
# GET /info      - 网关信息
# GET /metrics   - Prometheus 指标
