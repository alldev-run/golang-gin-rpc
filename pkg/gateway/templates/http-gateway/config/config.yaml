# HTTP Gateway 配置
# 企业级多协议统一网关

# =============================================================================
# 服务器基本配置
# =============================================================================
host: "0.0.0.0"
port: 8080
service_name: "__API_NAME__"
read_timeout: "30s"
write_timeout: "30s"
idle_timeout: "60s"

# =============================================================================
# CORS 跨域配置
# =============================================================================
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

# =============================================================================
# 限流保护配置
# =============================================================================
rate_limit:
  enabled: true
  requests: 1000
  window: "1m"

# =============================================================================
# 服务发现配置
# =============================================================================
discovery:
  type: consul
  endpoints:
    - "localhost:8500"
  namespace: default
  timeout: "5s"
  enabled: false
  options: {}

# =============================================================================
# 负载均衡配置
# =============================================================================
load_balancer:
  strategy: "round_robin"  # round_robin, random, weighted, least_connections

# =============================================================================
# 分布式追踪配置
# =============================================================================
tracing:
  enabled: false
  type: "jaeger"
  service_name: "__API_NAME__"
  endpoint: "http://localhost:14268/api/traces"
  sample_rate: 0.1

# =============================================================================
# 路由配置
# =============================================================================
routes:
  # 用户服务路由 - 使用服务发现
  - path: /api/user/*
    method: "GET"
    protocol: "http"
    service: user-service
    targets: ["http://localhost:8081"]
    timeout: "30s"
    retries: 3

  # 订单服务路由 - 使用服务发现
  - path: /api/order/*
    method: "POST"
    protocol: "http"
    service: order-service
    targets: ["http://localhost:8082"]
    timeout: "30s"
    retries: 3

  # gRPC 用户服务路由 - 使用服务发现
  - path: /grpc/user/*
    method: "GET"
    protocol: "grpc"
    service: user-grpc-service
    targets: ["http://localhost:50051"]
    timeout: "30s"
    retries: 3

  # gRPC 订单服务路由 - 使用服务发现
  - path: /grpc/order/*
    method: "POST"
    protocol: "grpc"
    service: order-grpc-service
    targets: ["http://localhost:50052"]
    timeout: "30s"
    retries: 3

  # JSON-RPC 支付服务路由 - 使用服务发现
  - path: /rpc/payment
    method: "POST"
    protocol: "jsonrpc"
    service: payment-rpc-service
    targets: ["http://localhost:8087/rpc", "http://localhost:8088/rpc"]
    timeout: "30s"
    retries: 3

  # 调试端点 - 本地路由
  - path: /debug/*
    method: "*"
    protocol: "http"
    service: debug-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

  # Hello 服务 - 本地路由
  - path: /
    method: "*"
    protocol: "http"
    service: hello-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

# =============================================================================
# 协议支持配置
# =============================================================================
protocols:
  http: true
  http2: true
  grpc: true
  jsonrpc: true

  # gRPC 配置
  grpc_config:
    enable_tls: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    server_name: ""
    insecure: false
    timeout: "30s"

  # JSON-RPC 配置
  jsonrpc_config:
    version: "2.0"
    enable_batch: false
    timeout: "30s"
    headers: {}

  # RPC 安全配置
  security:
    # RPC 服务认证配置
    auth:
      enabled: false  # 默认禁用，需要手动启用
      type: "apikey"  # apikey, jwt, oauth2
      header_name: "X-API-Key"
      query_name: "api_key"
      skip_paths:
        - "/health"
        - "/ready"
        - "/info"
        - "/debug/*"
      skip_methods:
        - "OPTIONS"
      api_keys: {}  # 空配置，需要手动添加 API Keys

    # TLS 配置
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_file: ""
      server_name: ""
      insecure: false

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "info"
  format: "json"
