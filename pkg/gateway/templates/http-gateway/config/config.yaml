# HTTP Gateway 配置
# 企业级多协议统一网关

# =============================================================================
# 服务器基本配置
# =============================================================================
host: "0.0.0.0"
port: 8080
service_name: "__API_NAME__"
read_timeout: "30s"
write_timeout: "30s"
idle_timeout: "60s"

framework:
  init_databases: false
  init_cache: false
  init_discovery: false
  init_tracing: false
  init_auth: false
  init_metrics: true
  init_health: true
  init_errors: true
  validate_dependency_coverage: true
  services: ["api-gateway"]

# =============================================================================
# CORS 跨域配置
# =============================================================================
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

# =============================================================================
# 限流保护配置
# =============================================================================
rate_limit:
  enabled: true
  requests: 1000
  window: "1m"

# =============================================================================
# IP 过滤与 GeoIP 配置（企业级安全）
# =============================================================================
ip_filter:
  # 是否启用 IP 过滤
  enabled: false
  
  # 过滤模式: "blacklist" | "whitelist"
  mode: "blacklist"
  
  # IP 黑名单/白名单列表（支持 CIDR）
  ip_list: []
  # 示例:
  # ip_list:
  #   - "192.168.1.100"           # 单个 IP
  #   - "10.0.0.0/8"              # 内网网段
  #   - "172.16.0.0/12"
  
  # 国家代码黑名单（ISO 3166-1 alpha-2）
  country_blacklist: []
  # 示例:
  # country_blacklist:
  #   - "CN"                      # 中国
  #   - "RU"                      # 俄罗斯
  
  # 国家代码白名单（如果设置，优先于黑名单）
  country_whitelist: []
  # 示例:
  # country_whitelist:
  #   - "US"                      # 只允许美国
  #   - "GB"
  
  # 是否启用 GeoIP 查询（需要 GeoLite2 数据库）
  enable_geoip: false
  
  # GeoIP2 数据库文件路径
  geoip_db_path: ""
  # 示例: "/etc/geoip/GeoLite2-Country.mmdb"
  
  # 拦截时的响应消息
  block_message: "Access denied"
  
  # 拦截时的 HTTP 状态码
  block_status_code: 403
  
  # 跳过的路径（不拦截的路径）
  skip_paths:
    - "/health"
    - "/metrics"
    - "/ping"
    - "/ready"
    - "/favicon.ico"
  
  # 是否信任代理头（X-Forwarded-For, X-Real-IP）
  trust_proxy: true

# =============================================================================
# 服务发现配置
# =============================================================================
discovery:
  type: consul
  endpoints:
    - "localhost:8500"
  namespace: default
  timeout: "5s"
  enabled: false
  options: {}

# =============================================================================
# 负载均衡配置
# =============================================================================
load_balancer:
  strategy: "round_robin"  # round_robin, random, weighted, least_connections

# =============================================================================
# 分布式追踪配置
# =============================================================================
tracing:
  enabled: false
  type: "jaeger"
  service_name: "__API_NAME__"
  endpoint: "http://localhost:14268/api/traces"
  sample_rate: 0.1

# =============================================================================
# 路由配置
# =============================================================================
routes:
  # 用户服务路由 - 使用服务发现
  - path: /api/user/*
    method: "GET"
    protocol: "http"
    service: user-service
    targets: ["http://localhost:8081"]
    timeout: "30s"
    retries: 3

  # 订单服务路由 - 使用服务发现
  - path: /api/order/*
    method: "POST"
    protocol: "http"
    service: order-service
    targets: ["http://localhost:8082"]
    timeout: "30s"
    retries: 3

  # gRPC 用户服务路由 - 使用服务发现
  - path: /grpc/user/*
    method: "GET"
    protocol: "grpc"
    service: user-grpc-service
    targets: ["http://localhost:50051"]
    timeout: "30s"
    retries: 3

  # gRPC 订单服务路由 - 使用服务发现
  - path: /grpc/order/*
    method: "POST"
    protocol: "grpc"
    service: order-grpc-service
    targets: ["http://localhost:50052"]
    timeout: "30s"
    retries: 3

  # JSON-RPC 支付服务路由 - 使用服务发现
  - path: /rpc/payment
    method: "POST"
    protocol: "jsonrpc"
    service: payment-rpc-service
    targets: ["http://localhost:8087/rpc", "http://localhost:8088/rpc"]
    timeout: "30s"
    retries: 3

  # 调试端点 - 本地路由
  - path: /debug/*
    method: "*"
    protocol: "http"
    service: debug-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

  # Hello 服务 - 本地路由
  - path: /
    method: "*"
    protocol: "http"
    service: hello-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

# =============================================================================
# 协议支持配置
# =============================================================================
protocols:
  http: true
  http2: true
  grpc: true
  jsonrpc: true

  # gRPC 配置
  grpc_config:
    enable_tls: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    server_name: ""
    insecure: false
    timeout: "30s"
    
    # gRPC 安全配置
    # 注意: 当前代码结构只支持基础的 auth 和 tls 配置
    # 以下高级安全配置为未来扩展预留 (代码中暂未实现)
    security:
      # 认证配置 (代码支持)
      auth:
        enabled: false
        type: "apikey"  # apikey, jwt, oauth2
        header_name: "X-API-Key"
        query_name: "api_key"
        skip_paths:
          - "/grpc/health"
          - "/grpc/ready"
          - "/grpc/info"
        skip_methods:
          - "OPTIONS"
        api_keys: {}  # 需要手动添加 API Keys
        
        # 未来扩展配置 (代码中暂未实现)
        # api_key_config:
        #   hash_algorithm: "SHA256"
        #   include_prefix: true
        #   min_length: 32
        # jwt_config:
        #   secret: ""
        #   algorithm: "HS256"
        #   expiration: "24h"
        #   issuer: "__API_NAME__"
      
      # 未来扩展安全配置 (代码中暂未实现)
      # mTLS 配置
      # mtls:
      #   enabled: false
      #   client_ca_file: ""
      #   verify_client: true
      
      # 限流配置
      # rate_limit:
      #   enabled: false
      #   requests: 100
      #   window: "1m"
      
      # IP 白名单
      # ip_whitelist:
      #   enabled: false
      #   ips: []
      
      # 请求签名验证
      # signature:
      #   enabled: false
      #   secret: ""
      #   algorithm: "HMAC-SHA256"
      #   header_name: "X-Signature"
      #   timestamp_header: "X-Timestamp"
      #   max_skew: "300s"

  # JSON-RPC 配置
  jsonrpc_config:
    version: "2.0"
    enable_batch: false
    timeout: "30s"
    headers: {}
    
    # JSON-RPC 安全配置
    # 注意: 当前代码结构只支持基础的 auth 和 tls 配置
    # 以下高级安全配置为未来扩展预留 (代码中暂未实现)
    security:
      # 认证配置 (代码支持)
      auth:
        enabled: false
        type: "apikey"  # apikey, jwt, oauth2
        header_name: "X-API-Key"
        query_name: "api_key"
        skip_paths:
          - "/rpc/health"
          - "/rpc/ready"
          - "/rpc/info"
        skip_methods:
          - "OPTIONS"
        api_keys: {}  # 需要手动添加 API Keys
        
        # 未来扩展配置 (代码中暂未实现)
        # api_key_config:
        #   hash_algorithm: "SHA256"
        #   include_prefix: true
        #   min_length: 32
        # jwt_config:
        #   secret: ""
        #   algorithm: "HS256"
        #   expiration: "24h"
        #   issuer: "__API_NAME__"
      
      # 未来扩展安全配置 (代码中暂未实现)
      # 请求签名验证
      # signature:
      #   enabled: false
      #   secret: ""
      #   algorithm: "HMAC-SHA256"
      #   header_name: "X-Signature"
      #   timestamp_header: "X-Timestamp"
      #   max_skew: "300s"
      
      # 限流配置
      # rate_limit:
      #   enabled: false
      #   requests: 100
      #   window: "1m"
      
      # IP 白名单
      # ip_whitelist:
      #   enabled: false
      #   ips: []
      
      # 方法权限控制
      # method_permissions:
      #   "getUser": ["user", "admin"]
      #   "createUser": ["admin"]
      #   "deleteUser": ["admin"]

  # RPC 安全配置
  security:
    # RPC 服务认证配置
    auth:
      enabled: false  # 默认禁用，需要手动启用
      type: "apikey"  # apikey, jwt, oauth2
      header_name: "X-API-Key"
      query_name: "api_key"
      skip_paths:
        - "/health"
        - "/ready"
        - "/info"
        - "/debug/*"
      skip_methods:
        - "OPTIONS"
      api_keys: {}  # 空配置，需要手动添加 API Keys

    # TLS 配置
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_file: ""
      server_name: ""
      insecure: false

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "info"
  format: "json"
  
  # HTTP 请求日志配置
  http_logging:
    # 启用 HTTP 请求日志
    enabled: true
    
    # 记录请求体（调试时启用，生产环境建议关闭）
    log_request_body: true
    
    # 记录响应体（调试时启用，生产环境建议关闭）
    log_response_body: true
    
    # 最大请求/响应体大小（字节）
    max_body_size: 524288  # 512KB
    
    # 记录请求头
    log_headers: true
    
    # 敏感请求头列表（这些头会被跳过或脱敏）
    sensitive_headers:
      - "Authorization"
      - "Cookie"
      - "X-API-Key"
      - "X-Auth-Token"
      - "X-CSRF-Token"
    
    # 跳过日志记录的路径
    skip_paths:
      - "/health"
      - "/ready"
      - "/metrics"
      - "/favicon.ico"
    
    # 慢请求阈值
    slow_request_threshold: "2s"
    
    # 启用请求 ID 生成
    enable_request_id: true
    
    # 自定义请求 ID 头名称（可选，默认 X-Request-ID）
    # request_id_header: "X-Trace-ID"
    
    # 日志级别阈值配置
    log_level_thresholds:
      # 状态码 >= 500 记录为 ERROR
      error_threshold: 500
      # 状态码 >= 400 记录为 WARN  
      warn_threshold: 400
      # 状态码 >= 200 记录为 INFO
      info_threshold: 200
  
  # 服务日志器配置
  service_logging:
    enabled: true
    base_dir: "./logs/__API_NAME__"
    enable_date_folders: true
    separate_by_level: true  # API 网关需要按级别分离日志便于调试
    inherit_global_config: true
    
    # 覆盖配置
    override_config:
      level: "debug"  # 网关需要详细日志
      format: "json"
      max_size: 200  # 网关日志量较大
      max_backups: 15
      max_age: 45
      compress: true
      enable_caller: true
      enable_stacktrace: true
      time_format: "2006-01-02T15:04:05.000Z07:00"
      
      # 生产环境采样配置
      sampling:
        enabled: false  # 开发环境不启用采样
        rate: 0.05     # 生产环境可设为 5%
        tick: "1s"
        initial: 10
        thereafter: 100
    
    # 按组件分类的日志配置
    components:
      router:
        base_dir: "./logs/__API_NAME__/router"
        separate_by_level: true
        override_config:
          level: "debug"
          max_size: 150
          max_backups: 10
      
      middleware:
        base_dir: "./logs/__API_NAME__/middleware"
        separate_by_level: true
        override_config:
          level: "info"
          max_size: 100
          max_backups: 8
      
      discovery:
        base_dir: "./logs/__API_NAME__/discovery"
        separate_by_level: false
        override_config:
          level: "info"
          max_size: 50
          max_backups: 5
      
      load_balancer:
        base_dir: "./logs/__API_NAME__/load-balancer"
        separate_by_level: false
        override_config:
          level: "info"
          max_size: 50
          max_backups: 5
      
      security:
        base_dir: "./logs/__API_NAME__/security"
        separate_by_level: true  # 安全日志需要级别分离
        override_config:
          level: "info"
          max_size: 100
          max_backups: 30  # 安全日志保留更久
          max_age: 90
    
    # 日志清理配置
    cleanup:
      enabled: true
      schedule: "0 2 * * *"  # 每天凌晨2点清理
      max_age_days: 30
      exclude_components: ["security"]  # 安全日志保留更久
      compress_old: true
