# HTTP Gateway 可用配置示例（与 pkg/gateway/config.go 对齐）

host: "0.0.0.0"
port: 8080
service_name: "api-gateway"
read_timeout: "30s"
write_timeout: "30s"
idle_timeout: "60s"

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

rate_limit:
  enabled: true
  requests: 1000
  window: "1m"

discovery:
  type: "static"             # static / consul / etcd / zookeeper（由 pkg/discovery 决定）
  endpoints: []
  namespace: "default"
  timeout: "5s"
  enabled: false
  options: {}

load_balancer:
  strategy: "round_robin"    # round_robin / random / weighted / least_connections

tracing:
  type: "jaeger"
  service_name: "gateway"
  service_version: "1.0.0"
  environment: "development"
  enabled: false
  host: "localhost"
  port: 6831
  endpoint: "/api/traces"
  sample_rate: 1.0
  batch_timeout: "5s"
  max_export_batch_size: 512
  options: {}

protocols:
  http: true
  http2: true
  grpc: true
  jsonrpc: true

  grpc_config:
    enable_tls: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    server_name: ""
    insecure: false
    timeout: "30s"

  jsonrpc_config:
    version: "2.0"
    enable_batch: false
    timeout: "30s"
    headers:
      "Content-Type": "application/json"

  security:
    auth:
      enabled: false
      type: "apikey"
      header_name: "X-API-Key"
      query_name: "api_key"
      skip_paths:
        - "/health"
        - "/ready"
        - "/info"
        - "/debug/*"
      skip_methods:
        - "OPTIONS"
      api_keys: {}
    tls:
      enabled: false
      cert_file: ""
      key_file: ""
      ca_file: ""
      server_name: ""
      insecure: false
      client_cert_file: ""
      client_key_file: ""

routes:
  - path: "/api/v1/users/*"
    method: "*"
    protocol: "http"
    service: "user-service"
    targets:
      - "http://localhost:8081"
      - "http://localhost:8082"
    strip_prefix: false
    timeout: "30s"
    retries: 3
    headers: {}
    query: {}

  - path: "/grpc/user/*"
    method: "POST"
    protocol: "grpc"
    service: "user-grpc-service"
    targets:
      - "grpc://localhost:50051"
    timeout: "30s"
    retries: 3

  - path: "/rpc/payment"
    method: "POST"
    protocol: "jsonrpc"
    service: "payment-service"
    targets:
      - "http://localhost:8087/rpc"
    timeout: "30s"
    retries: 3

logging:
  level: "info"
  format: "json"
