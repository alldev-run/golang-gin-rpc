# HTTP Gateway 配置
# 企业级多协议统一网关

# =============================================================================
# 服务器基本配置
# =============================================================================
host: "0.0.0.0"
port: 8080  # 修改端口避免冲突
service_name: "http-gateway"
read_timeout: "30s"
write_timeout: "30s"
idle_timeout: "60s"

# =============================================================================
# CORS 跨域配置
# =============================================================================
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

# =============================================================================
# 限流保护配置
# =============================================================================
rate_limit:
  enabled: true
  requests: 1000
  window: "1m"

# =============================================================================
# 服务发现配置
# =============================================================================
discovery:
  type: consul  # 支持: static, consul, etcd, zookeeper
  endpoints: 
    - "localhost:8500"  # Consul 地址
  namespace: default
  timeout: "5s"
  enabled: false  # 默认关闭，需要时启用
  options: {}

# =============================================================================
# 负载均衡配置
# =============================================================================
load_balancer:
  strategy: round_robin

# =============================================================================
# 分布式追踪配置
# =============================================================================
tracing:
  type: "jaeger"
  service_name: "http-gateway"
  enabled: false  # 默认关闭，需要时启用
  host: "localhost"
  port: 6831
  sample_rate: 0.1

# =============================================================================
# 协议支持配置
# =============================================================================
protocols:
  http: true
  http2: true
  grpc: false   # 启用 gRPC 协议支持
  jsonrpc: false # 启用 JSON-RPC 协议支持
  
  grpc_config:
    enable_tls: false
    server_name: "http-gateway.example.com"
    timeout: "30s"
    # gRPC 客户端配置
    discovery_cache_ttl: "10s"
    failover_threshold: 3
    failover_cooldown: "30s"
  
  jsonrpc_config:
    version: "2.0"
    enable_batch: false
    timeout: "30s"
    headers:
      "Content-Type": "application/json"
    # JSON-RPC 客户端配置
    discovery_cache_ttl: "10s"
    failover_threshold: 3
    failover_cooldown: "30s"

# =============================================================================
# 路由配置
# =============================================================================
routes:
  # 用户服务路由 - 使用服务发现
  - path: /api/user/*
    method: "*"
    protocol: "http"
    service: user-service  # 服务发现中的服务名
    targets: ["http://localhost:8081", "http://localhost:8082"]  # 静态备用
    strip_prefix: true
    timeout: "30s"
    retries: 3
    headers:
      X-Service: user-service
    query: {}

  # 订单服务路由 - 使用服务发现
  - path: /api/order/*
    method: "*"
    protocol: "http"
    service: order-service  # 服务发现中的服务名
    targets: ["http://localhost:8083", "http://localhost:8084"]  # 静态备用
    strip_prefix: true
    timeout: "30s"
    retries: 3
    headers:
      X-Service: order-service
    query: {}

  # 支付服务路由 - 使用服务发现
  - path: /api/payment/*
    method: "*"
    protocol: "http"
    service: payment-service  # 服务发现中的服务名
    targets: ["http://localhost:8085", "http://localhost:8086"]  # 静态备用
    strip_prefix: true
    timeout: "30s"
    retries: 3
    headers:
      X-Service: payment-service
    query: {}

  # gRPC 用户服务路由 - 使用服务发现
  - path: /grpc/user/*
    method: "POST"
    protocol: "grpc"
    service: user-grpc-service  # 服务发现中的服务名
    targets: ["grpc://localhost:50051", "grpc://localhost:50052"]  # 静态备用
    timeout: "30s"
    retries: 3

  # JSON-RPC 支付服务路由 - 使用服务发现
  - path: /rpc/payment
    method: "POST"
    protocol: "jsonrpc"
    service: payment-rpc-service  # 服务发现中的服务名
    targets: ["http://localhost:8087/rpc", "http://localhost:8088/rpc"]  # 静态备用
    timeout: "30s"
    retries: 3

  # 调试端点 - 本地路由
  - path: /debug/*
    method: "*"
    protocol: "http"
    service: debug-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

  # Hello 服务 - 本地路由
  - path: /
    method: "*"
    protocol: "http"
    service: hello-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "info"
  format: "json"
