
host: "0.0.0.0"
port: 8080
read_timeout: 30s
write_timeout: 30s
idle_timeout: 60s

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

rate_limit:
  enabled: true
  requests: 100
  window: 1m

discovery:
  type: static
  endpoints: []
  namespace: default
  timeout: 5s
  options: {}

load_balancer:
  strategy: round_robin

routes:
  - path: /api/user/*path
    method: "*"
    service: user-service
    targets: []
    strip_prefix: true
    timeout: 30s
    retries: 3
    headers:
      X-Service: user-service
    query: {}

  - path: /api/order/*path
    method: "*"
    service: order-service
    targets: []
    strip_prefix: true
    timeout: 30s
    retries: 3
    headers:
      X-Service: order-service
    query: {}
