# HTTP Gateway 配置
# 企业级多协议统一网关

# =============================================================================
# 服务器基本配置
# =============================================================================
host: "0.0.0.0"
port: 8080
service_name: "http-gateway"
read_timeout: "30s"
write_timeout: "30s"
idle_timeout: "60s"

# =============================================================================
# CORS 跨域配置
# =============================================================================
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers: []
  allow_credentials: false
  max_age: 86400

# =============================================================================
# 限流保护配置
# =============================================================================
rate_limit:
  enabled: true
  requests: 1000
  window: "1m"

# =============================================================================
# 服务发现配置
# =============================================================================
discovery:
  type: static
  endpoints: 
    - "http://localhost:8080"
  namespace: default
  timeout: "5s"
  options: {}

# =============================================================================
# 负载均衡配置
# =============================================================================
load_balancer:
  strategy: round_robin

# =============================================================================
# 分布式追踪配置
# =============================================================================
tracing:
  type: "jaeger"
  service_name: "http-gateway"
  enabled: false  # 默认关闭，需要时启用
  host: "localhost"
  port: 6831
  sample_rate: 0.1

# =============================================================================
# 协议支持配置
# =============================================================================
protocols:
  http: true
  http2: true
  grpc: false   # 默认关闭，需要时启用
  jsonrpc: false # 默认关闭，需要时启用
  
  grpc_config:
    enable_tls: false
    server_name: "http-gateway.example.com"
    timeout: "30s"
  
  jsonrpc_config:
    version: "2.0"
    enable_batch: false
    timeout: "30s"
    headers:
      "Content-Type": "application/json"

# =============================================================================
# 路由配置
# =============================================================================
routes:
  # 本地 API 路由
  - path: /api/*
    method: "*"
    protocol: "http"
    service: local-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "30s"
    retries: 3

  # 调试端点
  - path: /debug/*
    method: "*"
    protocol: "http"
    service: debug-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

  # Hello 服务
  - path: /
    method: "*"
    protocol: "http"
    service: hello-service
    targets:
      - "http://localhost:8080"
    strip_prefix: false
    timeout: "5s"
    retries: 1

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "info"
  format: "json"
